<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Connexion — KaalisBank</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="utility-bar">
            <div class="utility-left">
                <a href="tel:+221338100000"><i class="icon-phone"></i> +221 33 810 00 00</a>
                <a href="#agences">Trouver une agence</a>
            </div>
            <div class="utility-right">
                <a href="#" class="lang active">FR</a>
                <span class="divider">|</span>
                <a href="#" class="lang">EN</a>
            </div>
        </div>

        <header class="main-nav">
            <a href="index.html" class="logo">KaalisBank</a>
            <nav class="nav-links">
                <a href="index.html">Accueil</a>
                <a href="index.html#services">Services</a>
                <a href="index.html#convertisseur">Convertisseur</a>
                <a href="index.html#apropos">A propos</a>
            </nav>
            <a href="index.html" class="btn-client">Retour au site</a>
        </header>

        <div class="login-wrap">
            <div class="login-card">
                <span class="eyebrow">Espace client</span>
                <h2>Connexion</h2>
                <p class="login-sub">Accedez a votre compte KaalisBank.</p>

                <form data-form="login">
                    <div class="form-group">
                        <label for="email">Adresse e-mail</label>
                        <input type="email" id="email" placeholder="fatou@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Mot de passe</label>
                        <input type="password" id="password" placeholder="********" required>
                    </div>
                    <button type="submit" class="btn-primary btn-full">Se connecter</button>
                </form>

                <p class="login-hint">Demonstration : n'importe quelles valeurs vous connectent au tableau de bord.</p>
            </div>
        </div>

        <footer class="site-footer">
            <div class="footer-bottom">
                <p>&copy; 2026 KaalisBank — Dakar, Senegal</p>
            </div>
        </footer>

        <script src="script.js"></script>
    </body>
</html>
